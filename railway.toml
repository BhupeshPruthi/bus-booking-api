# Railway config-as-code: https://docs.railway.com/deploy/config-as-code
# Migrations run inside Railway (DATABASE_URL with *.railway.internal works there only).

[build]
builder = "nixpacks"

[deploy]
preDeployCommand = ["npm", "run", "migrate:prod"]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 100
