# Railway config-as-code: https://docs.railway.com/deploy/config-as-code
# Migrations run inside Railway (DATABASE_URL with *.railway.internal works there only).

[build]
builder = "nixpacks"

[deploy]
# Use npx knex directly so deploy works even if package.json lacks migrate:prod (older commits).
preDeployCommand = "npx knex migrate:latest --env production"
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 100
